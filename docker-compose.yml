# Baari — local all-in-one stack for non-technical testing.
# Bundles its own Postgres so there's nothing to configure. Just:
#   docker compose up --build
# then open http://localhost:8000
#
# The dev secrets below are intentionally hardcoded for local testing ONLY.
# Production uses real env vars on Vercel.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baari
      POSTGRES_PASSWORD: baari
      POSTGRES_DB: baari
    volumes:
      - baari_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baari -d baari"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://baari:baari@db:5432/baari
      JWT_SECRET: local-dev-jwt-secret-not-for-production
      CRON_SECRET: local-dev-cron-secret
      APP_ENV: dev
      CLINIC_TZ: Asia/Kolkata
    ports:
      - "8000:8000"

volumes:
  baari_pgdata:
