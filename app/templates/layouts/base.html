<!doctype html>
<html lang="en"{% if theme %} data-theme="{{ theme }}"{% endif %}>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Baari{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/ext/response-targets.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.7/dist/cdn.min.js"></script>
  <script>
    // Give HTMX a brief swap/settle window so our CSS transitions actually paint.
    // (Defaults are 0/20ms, so .htmx-swapping never gets a chance to render.)
    // Also flip on global View Transitions API support so HTMX swaps cross-fade
    // via document.startViewTransition() where the browser allows.
    window.addEventListener('DOMContentLoaded', () => {
      if (window.htmx) {
        htmx.config.defaultSwapDelay = 90;
        htmx.config.defaultSettleDelay = 60;
        htmx.config.globalViewTransitions = true;
      }
    });
  </script>
</head>
<body hx-ext="response-targets">
  <div class="reconnect-banner" id="reconnect-banner">
    <i class="ti ti-wifi-off"></i> {{ t("common.reconnecting") }}
  </div>

  {% block body %}{% endblock %}

  <div class="toast-stack" id="toast-stack"
       hx-swap-oob="beforeend"></div>

  <script>
    // Surface offline state — matches PRD §11.4
    function setReconnect(on) {
      document.getElementById('reconnect-banner').classList.toggle('show', on);
    }
    window.addEventListener('online', () => setReconnect(false));
    window.addEventListener('offline', () => setReconnect(true));

    document.body.addEventListener('htmx:sendError', () => setReconnect(true));
    document.body.addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.successful) setReconnect(false);
    });

    // Auto-dismiss toasts after 4s
    document.body.addEventListener('htmx:oobAfterSwap', (e) => {
      if (e.detail.target?.id === 'toast-stack') {
        const last = e.detail.target.lastElementChild;
        if (last) setTimeout(() => last.remove(), 4000);
      }
    });

    // Theme toggle — sync the form's submitted value and the icon to the
    // CURRENTLY-RESOLVED theme, not just the cookie. The server can't know
    // the OS preference, so when no cookie is set the form would otherwise
    // post `dark` even though the user is already seeing dark via OS auto,
    // making the first click a no-op.
    function resolvedTheme() {
      return document.documentElement.dataset.theme ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }
    function syncThemeUI() {
      const isDark = resolvedTheme() === 'dark';
      document.querySelectorAll('form[action="/theme"]').forEach(form => {
        const input = form.querySelector('input[name="theme"]');
        if (input) input.value = isDark ? 'light' : 'dark';
        const icon = form.querySelector('i.ti');
        if (icon) {
          icon.classList.remove('ti-sun', 'ti-moon-stars');
          icon.classList.add(isDark ? 'ti-sun' : 'ti-moon-stars');
        }
      });
    }
    syncThemeUI();
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', syncThemeUI);
  </script>
</body>
</html>
